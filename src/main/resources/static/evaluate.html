<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Build Performance Evaluation | Antigravity</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container animate-fade">
        <h1>PC Build Performance Evaluation</h1>
        <div class="grid">
            <!-- Left: Stats & Breakdown -->
            <div class="card">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <div style="font-size: 0.875rem; color: var(--text-dim); text-transform: uppercase;">Total Score</div>
                    <div id="total-score" style="font-size: 4rem; font-weight: 800; color: var(--primary);">0</div>
                    <div id="tier-badge" class="tier-badge tier-b">B-TIER</div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div style="background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 1rem;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <span>CPU Performance</span>
                            <span id="cpu-score-val" style="font-weight: 700;">-</span>
                        </div>
                        <div style="height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
                            <div id="cpu-bar" style="height: 100%; background: var(--primary); width: 0%;"></div>
                        </div>
                    </div>

                    <div style="background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 1rem;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                            <span>GPU Performance</span>
                            <span id="gpu-score-val" style="font-weight: 700;">-</span>
                        </div>
                        <div style="height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
                            <div id="gpu-bar" style="height: 100%; background: var(--secondary); width: 0%;"></div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 1rem;">
                            <div style="font-size: 0.75rem; color: var(--text-dim);">RAM Bonus</div>
                            <div id="ram-bonus" style="font-weight: 700; color: var(--success);">+0</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 1rem;">
                            <div style="font-size: 0.75rem; color: var(--text-dim);">Storage Bonus</div>
                            <div id="storage-bonus" style="font-weight: 700; color: var(--success);">+0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Radar Chart -->
            <div class="card" style="display: flex; align-items: center; justify-content: center;">
                <div class="radar-container">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Game Compatibility -->
        <div class="card" style="margin-top: 2rem;">
            <h2 style="font-size: 1.5rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center;">
                Game Compatibility 
                <span style="font-size: 0.875rem; background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 0.5rem;">Testing 10 Popular Games</span>
            </h2>
            <div id="game-list" class="game-list">
                <!-- Games injected here -->
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
    <script>
        // Start evaluating
        const sampleRequest = {
            cpuId: "cpu-uuid-123",
            vgaId: "vga-uuid-RTX4090",
            ramId: "ram-uuid-123",
            ssdIds: ["ssd-uuid-123"]
        };

        // For demo purposes, we automatically trigger on load
        window.onload = () => evaluateBuild(sampleRequest);
    </script>
</body>
</html>
